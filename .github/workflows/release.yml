name: Release bundle

# Builds a signed, Play-ready .aab (plus a signed .apk for sideloading).
# Runs on version tags (v0.14, v1.0 ...) or manually from the Actions tab.
#
# Required repository secrets:
#   SIGNING_KEYSTORE_BASE64    base64 of the upload keystore (.jks)
#   SIGNING_KEYSTORE_PASSWORD  keystore password
#   SIGNING_KEY_ALIAS          key alias inside the keystore
#   SIGNING_KEY_PASSWORD       key password
#   GOOGLE_WEB_CLIENT_ID       OAuth Web client ID baked into BuildConfig
# Optional:
#   ADMIN_EMAILS               comma-separated debug-log allowlist

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"

      - name: Build signed bundle and APK
        env:
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/upload.jks
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
        run: ./gradlew bundleRelease assembleRelease --stacktrace

      - name: Upload app bundle (for Play Console)
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload APK (for sideloading)
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
